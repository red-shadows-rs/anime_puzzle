<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rearrange scattered anime scenes into perfect pictures in this elegant and interactive puzzle game">
  <meta name="author" content="Red Shadows | RS">
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
  <title>🍬 aPuzzle - القائمة الرئيسية</title>
  <link rel="stylesheet" href="styles/game-ui.css" />
  <link rel="stylesheet" href="styles/aPuzzleStyle.css" />
</head>

<body>
  <div id="game-container" class="anime-theme">
    <header>
      <h1>🍬 aPuzzle</h1>
    </header>

<main class="main-menu">
  <div class="menu-card">
    <h2>🎮 ابدأ اللعبة</h2>
    <button id="btn-start">ابدأ</button>
  </div>

  <div class="menu-card">
    <h2>🛒 متجر الأدوات</h2>
    <button id="btn-shop">الدخول إلى المتجر</button>
  </div>
</main>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
     
    const startBtn = document.getElementById('btn-start');
    if (startBtn) {
        startBtn.addEventListener('click', () => {
            // هنا نوجه المستخدم يدوياً للصفحة التالية
            window.location.href = 'levels.html';
        });
    }

    // زر المتجر
    const shopBtn = document.getElementById('btn-shop');
    if (shopBtn) {
        shopBtn.addEventListener('click', () => {
            // بدلاً من الانتقال لصفحة جديدة، يفضل تغيير المسار هكذا 
            // أو إظهار DIV المتجر إذا كنت ستدمجهما
            window.location.href = 'shop.html';
        });
    }
});
  </script>
</body>


</html>
