<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>🍬 aPuzzle - قائمة الألغاز</title>
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.discord.com https://*.discordapp.com; frame-ancestors *;">
  <link rel="stylesheet" href="styles/game-ui.css" />
  <link rel="stylesheet" href="styles/levelStyle.css" />
</head>
<body>
  <h1>🧩 قائمة الألغاز</h1>
  <div class="currency-card">
    💰 عملاتك: <span id="coins">0</span>
    <button id="btn-go-shop">🛒 متجر الأدوات</button>
  </div>

  <div class="levels-grid" id="levels-list"></div>
  <script src="scripts/discord-sdk-min.js?v=1.1"></script>
  <script src="scripts/discord-presence.js?v=1.0"></script>
  <script>
    // عند تحميل قائمة المستويات
    window.onload = () => {
        setTimeout(() => updateActivity("يختار لغزاً مناسباً", "في قائمة المستويات 🧩"), 1000);
    };
  </script>
  <script src="scripts/levels.js"></script>
  <script>
    const coinsEl = document.getElementById("coins");
    const list = document.getElementById("levels-list");
    const shopBtn = document.getElementById("btn-go-shop"); 

    if (shopBtn) {
        shopBtn.addEventListener('click', () => {
            window.location.href = 'shop.html';
        });
    }

    let coins = parseInt(localStorage.getItem("coins") || "500");
    coinsEl.textContent = coins;

    const progress = new Set(JSON.parse(localStorage.getItem("puzzleProgress") || "[]"));

    function updateCoinsDisplay() {
        coins = parseInt(localStorage.getItem("coins") || "500");
        coinsEl.textContent = coins;
    }

    fetch("assets/shop.json")
        .then(res => res.json())
        .then(shopItems => { renderLevels(shopItems); });

    function renderLevels(shopItems) {
        list.innerHTML = "";
        levels.forEach(level => {
            const shopItem = shopItems.find(item => item.type === "level" && item.levelId === level.id);
            const price = shopItem ? shopItem.price : 0;
            const isUnlocked = level.id === 1 || progress.has(level.id) || localStorage.getItem(`unlocked_level_${level.id}`) === "true";

            const card = document.createElement("div");
            card.className = "level-card " + (isUnlocked ? "" : "locked");
            card.innerHTML = `<img src="${level.image}"><h3>${level.name}</h3><p>🧩 ${level.width} × ${level.height}</p>`;

            const btn = document.createElement("button");
            if (isUnlocked) {
                btn.textContent = "🚀 ابدأ";
                btn.onclick = () => { window.location.href = `play.html?level=${level.id}`; };
            } else {
                btn.textContent = `🔓 افتح بـ ${price} عملة`;
                btn.onclick = () => {
                    if (coins >= price) {
                        if (confirm(`فتح هذا اللغز؟`)) {
                            coins -= price;
                            localStorage.setItem("coins", coins);
                            progress.add(level.id);
                            localStorage.setItem("puzzleProgress", JSON.stringify([...progress]));
                            updateCoinsDisplay();
                            renderLevels(shopItems);
                        }
                    } else { alert("❌ رصيد غير كافٍ"); }
                };
            }
            card.appendChild(btn);
            list.appendChild(card);
        });
    }
  </script>
</body>
</html>
