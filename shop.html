<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛒 متجر | 🍬 aPuzzle</title>
  <meta name="description" content="Rearrange scattered anime scenes into perfect pictures in this elegant and interactive puzzle game">
  <meta name="author" content="Red Shadows | RS">
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
  <link rel="stylesheet" href="styles/game-ui.css" />
  <link rel="stylesheet" href="styles/shopStyle.css" />
</head>

<body>
  <div class="shop-container">
    <h2>🛒 متجر | 🍬 aPuzzle</h2>

    <div class="coins-bubble">💰 رصيدك الحالي: <span id="coins">0</span></div>

    <div id="shop-list"></div>
    <button id="backButton" class="back-button">
      🔙 رجوع
    </button>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
    const backBtn = document.getElementById("backButton");
    const coinsEl = document.getElementById("coins");

    // تحديث الرصيد (للتأكد من ظهوره فوراً)
    let coins = localStorage.getItem("coins") || "500";
    if (coinsEl) coinsEl.textContent = coins;

    if (backBtn) {
        // التحقق مما إذا كان المتجر مفتوحاً داخل Iframe (مثل صفحة اللعب)
        if (window.self !== window.top) {
            // داخل نافذة منبثقة (Modal): الزر يجب أن يغلق النافذة في الصفحة الأب
            backBtn.textContent = "❌ إغلاق المتجر";
            backBtn.addEventListener('click', () => {
                // محاولة إغلاق المودال في الصفحة الأب إذا كانت الدالة موجودة
                if (window.parent && typeof window.parent.closeShopModal === 'function') {
                    window.parent.closeShopModal();
                } else {
                    // إذا لم نتمكن من الوصول للأب، نخفيه برمجياً كحل أخير
                    window.parent.document.getElementById('shopModal').style.display = 'none';
                }
            });
        } else {
            // صفحة مستقلة (مثل الانتقال من قائمة المستويات)
            backBtn.addEventListener('click', () => {
                // نحاول الرجوع للخلف، وإذا لم يوجد تاريخ نعود للقائمة الرئيسية
                if (document.referrer !== "") {
                    window.history.back();
                } else {
                    window.location.href = 'levels.html';
                }
            });
        }
    }
});
  </script>
  <script src="scripts/shop.js"></script>
</body>

</html>
