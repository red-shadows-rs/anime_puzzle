<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛒 متجر | 🍬 aPuzzle</title>
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.discord.com https://*.discordapp.com; frame-ancestors *;">
  <link rel="stylesheet" href="styles/game-ui.css" />
  <link rel="stylesheet" href="styles/shopStyle.css" />
</head>
<body>
  <div class="shop-container">
    <h2>🛒 المتجر</h2>
    <div class="coins-bubble">💰 رصيدك: <span id="coins">0</span></div>
    <div id="shop-list"></div>
    <button id="backButton" class="back-button">🔙 رجوع</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
    const backBtn = document.getElementById("backButton");
    const urlParams = new URLSearchParams(window.location.search);
    const isModal = urlParams.get('mode') === 'modal';

    if (backBtn) {
        if (isModal) {      
            backBtn.textContent = "❌ إغلاق المتجر";
            backBtn.addEventListener('click', () => {
                window.parent.postMessage(['close-shop'], '*');
            });
        } else {
            backBtn.textContent = "🔙 رجوع";
            backBtn.addEventListener('click', () => {
                if (document.referrer.includes('levels.html')) {
                    window.history.back();
                } else {
                    window.location.href = 'levels.html';
                }
            });
        }
    }
});
  </script>
  <script src="scripts/discord-sdk-min.js?v=1.4"></script>
  <script src="scripts/discord-presence.js?v=1.8"></script>
  <script>
    window.onload = () => {
        updateActivity("يتسوق في المتجر", "يبحث عن أدوات مساعدة 🛒");
    };
  </script>
  <script src="scripts/shop.js"></script>
</body>
</html>
