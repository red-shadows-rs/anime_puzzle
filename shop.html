<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛒 متجر | 🍬 aPuzzle</title>
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
  <link rel="stylesheet" href="styles/game-ui.css" />
  <link rel="stylesheet" href="styles/shopStyle.css" />
</head>
<body>
  <div class="shop-container">
    <h2>🛒 المتجر</h2>
    <div class="coins-bubble">💰 رصيدك: <span id="coins">0</span></div>
    <div id="shop-list"></div>
    <button id="backButton" class="back-button">🔙 رجوع</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const backBtn = document.getElementById("backButton");
        const coinsEl = document.getElementById("coins");

        let coins = localStorage.getItem("coins") || "500";
        if (coinsEl) coinsEl.textContent = coins;

        if (backBtn) {
            if (window.self !== window.top) {
                backBtn.textContent = "❌ إغلاق المتجر";
                backBtn.addEventListener('click', () => {
                    // إرسال البيانات كمصفوفة لحل مشكلة Protocol Error
                    window.parent.postMessage(['close-shop'], '*');
                });
            } else {
                backBtn.addEventListener('click', () => {
                    window.location.href = 'levels.html';
                });
            }
        }
    });
  </script>
  <script src="scripts/shop.js"></script>
</body>
</html>
