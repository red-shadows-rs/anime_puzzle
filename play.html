<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <title>🍬 aPuzzle - اللعب</title>
    <meta name="description" content="Rearrange scattered anime scenes into perfect pictures in this elegant and interactive puzzle game">
    <meta name="author" content="Red Shadows | RS">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
    <link rel="stylesheet" href="styles/game-uiStyle.css" />
    <link rel="stylesheet" href="styles/winStyle.css" />
    <link rel="stylesheet" href="styles/shopStyle.css" />

</head>

<body>
    <header>
        <h1 id="level-title">🧩 لغز الأنمي</h1>
        <div id="difficulty-display"
            style="background-color: rgba(47, 51, 74, 0.3); backdrop-filter: blur(10px); padding: 10px; border-radius: 12px; font-size: 18px; color: white; text-align: center; margin: 20px auto; max-width: fit-content;">
            🎯 مستوى الصعوبة: <span id="difficulty-label">---</span>
        </div>
        <div id="timeSpentDisplay"
            style="background-color: rgba(47, 51, 74, 0.3); backdrop-filter: blur(10px); padding: 10px; border-radius: 12px; font-size: 18px; color: white; text-align: center; margin: 20px auto; max-width: fit-content;">
            <span id="timeSpent">0</span>
        </div>
    </header>

    <div id="game-card">
        <div id="puzzle-board"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button id="hintButton">💡 تلميح</button>
            <button id="solveButton">🤖 حل تلقائي</button>
            <div id="toolCounts" style="margin-top: 10px; font-weight: bold;"></div>
        </div>
    </div>
    <div id="shopModal" class="shop-modal" style="display: none;">
      <div class="shop-modal-content">
          <span class="close-btn" id="btn-close-shop">×</span>
          <iframe src="shop.html" style="width: 100%; height: 90vh; border: none;"></iframe>
      </div>
    </div>

    <footer>
        <button id="btn-open-shop">🛒 متجر الأدوات</button>
        <button id="btn-back-levels">🔙 الرجوع إلى قائمة المستويات</button>
    </footer>

    <div class="win-modal" id="winModal" style="display: none;">
        <div class="win-content">
            <h2>🎉 أحسنت!</h2>
            <div class="stars" id="starRating">⭐⭐⭐</div>
            <p id="rewardText">لقد حصلت على 💰 <span id="rewardAmount">50</span> عملة!</p>
            <p id="winTime" style="margin-top: 10px; font-weight: bold;"></p>
            <button id="btn-win-close">🎮 الرجوع إلى قائمة المستويات</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const shopModal = document.getElementById("shopModal");
    const openShopBtn = document.getElementById("btn-open-shop");
    const closeShopBtn = document.getElementById("btn-close-shop");

    if (openShopBtn) {
        openShopBtn.addEventListener('click', () => {
            shopModal.style.display = "flex";
        });
    }

    if (closeShopBtn) {
        closeShopBtn.addEventListener('click', () => {
            shopModal.style.display = "none";
        });
    }
          
    const backBtn = document.getElementById("btn-back-levels");
    if (backBtn) {
        backBtn.addEventListener('click', () => {
            window.location.href = 'levels.html';
        });
    }
          
    const winCloseBtn = document.getElementById("btn-win-close");
    if (winCloseBtn) {
        winCloseBtn.addEventListener('click', () => {
            window.location.href = 'levels.html';
        });
    }
});
    </script>
    <script src="scripts/levels.js"></script>
    <script src="scripts/game.js"></script>
</body>

</html>
